<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal Slideshow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="slideshow-container">
    <h1>Animal Slideshow</h1>
    
    <div class="image-wrapper">
      <img id="animalImage" src="https://placehold.co/400x300?text=Bear" alt="Animal Image">
    </div>

    <h2 id="animalName">Bear</h2>

    <div class="controls">
      <button onclick="previousAnimal()">&#8592; Previous</button>
      <button onclick="nextAnimal()">Next &#8594;</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
